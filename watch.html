<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistir - LDX Play</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter&display=swap" rel="stylesheet">
  <style> body { background: #000; font-family: 'Inter', sans-serif; } .font-display { font-family: 'Bebas Neue', sans-serif; }</style>
</head>
<body class="text-white">

  <header class="fixed top-0 left-0 right-0 p-4 z-50 bg-gradient-to-b from-black to-transparent">
    <div class="flex items-center justify-between">
       <a href="index.html" class="font-display text-2xl">LDX Play</a>
       <span id="watch-title" class="text-sm text-gray-400 font-semibold hidden md:block"></span>
    </div>
  </header>

  <main id="player-wrapper" class="w-full h-screen flex items-center justify-center bg-black"></main>

  <script>
    const DB_KEY = 'ldxplay_db_v2';
    function getDB() { return JSON.parse(localStorage.getItem(DB_KEY)) || { content: [] }; }

    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const db = getDB();
    const item = db.content.find(i => i.id === id);

    const wrapper = document.getElementById('player-wrapper');
    const titleEl = document.getElementById('watch-title');

    if(item) {
      document.title = `Assistir: ${item.title} - LDX Play`;
      titleEl.innerText = item.title;

      // Lógica para YouTube Embed (Trailer)
      // Assume que videoUrl é o ID do vídeo (ex: vKQi3bBA1y8)
      if(item.videoUrl) {
         wrapper.innerHTML = `
           <iframe class="w-full h-full" 
             src="https://www.youtube.com/embed/${item.videoUrl}?autoplay=1&controls=1&modestbranding=1" 
             frameborder="0" 
             allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
             allowfullscreen>
           </iframe>`;
      } else {
         wrapper.innerHTML = `<div class="text-center p-8"><h3>Vídeo não disponível</h3></div>`;
      }
    } else {
       wrapper.innerHTML = `<div class="text-center text-red-500"><h1>Erro 404</h1></div>`;
    }
  </script>
</body>
</html>
