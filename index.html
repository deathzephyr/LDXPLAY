<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LDX Play - Streaming</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Carrega o Banco de Dados Externo -->
  <script src="database.js"></script>
  
  <style>
    :root { --bg-primary: #0a0a0f; --bg-secondary: #13131a; --accent: #6e2cf4; --accent-dark: #4a1ca8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: #fff; overflow-x: hidden; }
    .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
    
    /* Intro */
    #intro-screen { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; }
    .logo-letter { display: inline-block; font-family: 'Bebas Neue', sans-serif; font-size: 15vw; color: #fff; opacity: 0; transform: translateY(100px); animation: letterDrop 0.6s forwards; }
    .logo-letter:nth-child(1) { animation-delay: 0.1s; color: #9d5cf5; }
    .logo-letter:nth-child(2) { animation-delay: 0.2s; color: #9d5cf5; }
    .logo-letter:nth-child(3) { animation-delay: 0.3s; color: #6e2cf4; }
    .logo-letter:nth-child(4) { animation-delay: 0.4s; color: #fff; margin-left: 20px; }
    .logo-letter:nth-child(5) { animation-delay: 0.5s; color: #fff; }
    .logo-letter:nth-child(6) { animation-delay: 0.6s; color: #fff; }
    .logo-letter:nth-child(7) { animation-delay: 0.7s; color: #fff; }
    @keyframes letterDrop { to { opacity: 1; transform: translateY(0); } }
    #intro-screen.fade-out { opacity: 0; pointer-events: none; transition: opacity 1s; }

    /* Utils */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .input-style { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s; }
    .input-style:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.1); box-shadow: 0 0 0 3px rgba(110, 44, 244, 0.3); }
    .btn-primary { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%); transition: all 0.2s; }
    .btn-primary:hover { filter: brightness(1.2); transform: scale(1.02); }

    /* Components */
    .poster-card { flex: 0 0 auto; width: 160px; transition: transform 0.3s, z-index 0s; border-radius: 6px; overflow: hidden; }
    .poster-card:hover { transform: scale(1.08); z-index: 20; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .poster-card img { width: 100%; height: 240px; object-fit: cover; display: block; }
    .top10-number { font-family: 'Bebas Neue', sans-serif; font-size: 140px; line-height: 0.8; color: transparent; -webkit-text-stroke: 4px var(--accent); margin-right: -20px; z-index: 1; }
    .hero-gradient { background: linear-gradient(to right, #0a0a0f 0%, #0a0a0f 30%, transparent 70%), linear-gradient(to top, #0a0a0f 0%, transparent 50%); }
    .row-nav { position: absolute; top: 0; bottom: 0; width: 50px; background: rgba(10,10,15,0.9); z-index: 10; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity 0.3s; }
    .row-nav.right { right: 0; }
    .content-row:hover .row-nav { opacity: 1; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 50; display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 20px; }
    .modal-content { background: #181818; border-radius: 8px; width: 100%; max-width: 900px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: slideUp 0.4s; }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .progress-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.2); }
    .progress-fill { height: 100%; background: var(--accent); }
  </style>
</head>
<body>

  <!-- INTRO -->
  <div id="intro-screen">
    <div class="logo-container">
      <span class="logo-letter">L</span><span class="logo-letter">D</span><span class="logo-letter">X</span>
      <span class="logo-letter">P</span><span class="logo-letter">l</span><span class="logo-letter">a</span><span class="logo-letter">y</span>
    </div>
  </div>

  <div id="app"></div>

  <script>
    // =========================================================================
    // CONFIGURAÇÃO DO BANCO DE DADOS
    // =========================================================================
    const DB_KEY = 'ldxplay_external_db_v1';
    
    // Verifica se o banco de dados externo foi carregado
    if (typeof LDX_DATABASE === 'undefined') {
        alert("Erro: O arquivo database.js não foi encontrado ou está vazio.");
        var LDX_DATABASE = []; // Fallback vazio
    }

    function getDB() {
      const data = localStorage.getItem(DB_KEY);
      if (!data) {
        // Inicializa com os dados do arquivo externo
        const init = { users: [], currentUser: null, currentProfile: null, myList: [], history: [], content: LDX_DATABASE };
        localStorage.setItem(DB_KEY, JSON.stringify(init));
        return init;
      }
      
      // Atualização inteligente: mantém usuários e histórico, mas atualiza o catálogo se o arquivo JS tiver mudado
      const currentDb = JSON.parse(data);
      if (!currentDb.content || currentDb.content.length === 0 || currentDb.content.length < LDX_DATABASE.length) {
        currentDb.content = LDX_DATABASE;
        localStorage.setItem(DB_KEY, JSON.stringify(currentDb));
      }
      return currentDb;
    }

    function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(AppDB)); }

    let AppDB = getDB();
    let heroInterval = null;

    // =========================================================================
    // RENDER ENGINE
    // =========================================================================
    const APP = document.getElementById('app');

    function render(view) {
      document.body.style.overflow = 'auto';
      switch(view) {
        case 'auth': APP.innerHTML = renderAuth(); break;
        case 'profiles': APP.innerHTML = renderProfileSelection(); break;
        case 'main': APP.innerHTML = renderMainApp(); initMainEvents(); break;
      }
    }

    // =========================================================================
    // AUTH
    // =========================================================================
    function renderAuth() {
      return `
        <div class="fixed inset-0 bg-cover bg-center" style="background-image: url('https://image.tmdb.org/t/p/original/2R9Ug4A0oYwYkdOhLqzCfKLIqSD.jpg');">
          <div class="absolute inset-0 bg-black/70"></div>
        </div>
        <header class="relative z-10 p-6 md:p-10">
          <h1 class="font-display text-5xl text-white cursor-pointer hover:text-purple-400" onclick="goToAuth()">LDX Play</h1>
        </header>
        <main class="relative z-10 flex items-center justify-center min-h-[80vh] p-4">
          <div class="w-full max-w-md bg-black/80 backdrop-blur-md rounded-lg p-8 md:p-12 border border-white/10 shadow-2xl">
            <div id="auth-form-container">
              <h2 class="font-display text-3xl mb-6">Entrar</h2>
              <form onsubmit="handleLogin(event)" class="space-y-5">
                <input type="text" id="auth-email" placeholder="Email" class="input-style w-full py-3 px-4 rounded text-white" required>
                <input type="password" id="auth-pass" placeholder="Senha" class="input-style w-full py-3 px-4 rounded text-white" required>
                <p id="error-main" class="text-red-500 text-sm mb-4 hidden text-center font-medium"></p>
                <button type="submit" class="btn-primary w-full py-3 rounded font-semibold text-white">Entrar</button>
              </form>
              <p class="text-gray-400 text-sm mt-10">
                Novo por aqui? <a href="#" onclick="toggleSignup(true)" class="text-white hover:underline font-medium">Criar uma conta</a>.
              </p>
            </div>
            <div id="signup-form-container" class="hidden">
              <h2 class="font-display text-3xl mb-6">Criar Conta</h2>
              <form onsubmit="handleSignup(event)" class="space-y-5">
                <input type="text" id="signup-name" placeholder="Seu nome" class="input-style w-full py-3 px-4 rounded text-white" required>
                <input type="email" id="signup-email" placeholder="Email" class="input-style w-full py-3 px-4 rounded text-white" required>
                <input type="password" id="signup-pass" placeholder="Senha" class="input-style w-full py-3 px-4 rounded text-white" required>
                <p id="error-signup" class="text-red-500 text-sm mb-4 hidden text-center font-medium"></p>
                <button type="submit" class="btn-primary w-full py-3 rounded font-semibold text-white">Criar Conta</button>
              </form>
              <p class="text-gray-400 text-sm mt-6 text-center">
                Já tem uma conta? <a href="#" onclick="toggleSignup(false)" class="text-white hover:underline font-medium">Entrar</a>.
              </p>
            </div>
          </div>
        </main>`;
    }

    function toggleSignup(show) {
      document.getElementById('auth-form-container').classList.toggle('hidden', show);
      document.getElementById('signup-form-container').classList.toggle('hidden', !show);
    }
    function goToAuth() { render('auth'); }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const pass = document.getElementById('auth-pass').value;
      const user = AppDB.users.find(u => u.email === email && u.pass === pass);
      if(user) { AppDB.currentUser = user; saveDB(); render('profiles'); } 
      else { document.getElementById('error-main').textContent = "Email ou senha incorretos."; document.getElementById('error-main').classList.remove('hidden'); }
    }

    function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const pass = document.getElementById('signup-pass').value;
      if(AppDB.users.find(u => u.email === email)) { document.getElementById('error-signup').textContent = "Email já existe."; document.getElementById('error-signup').classList.remove('hidden'); return; }
      const newUser = { id: Date.now(), name, email, pass, profiles: [{ id: 1, name: name.split(' ')[0], avatar: 'https://ui-avatars.com/api/?name='+encodeURIComponent(name)+'&background=6e2cf4&color=fff', isMain: true }] };
      AppDB.users.push(newUser); AppDB.currentUser = newUser; saveDB(); render('profiles');
    }

    function logout() { AppDB.currentUser = null; AppDB.currentProfile = null; saveDB(); render('auth'); }

    // =========================================================================
    // PROFILES
    // =========================================================================
    function renderProfileSelection() {
      if(!AppDB.currentUser) return renderAuth();
      return `
        <div class="min-h-screen flex flex-col items-center justify-center bg-[#0a0a0f]">
          <h2 class="text-3xl mb-10 text-gray-300">Quem está assistindo?</h2>
          <div class="flex gap-5 flex-wrap justify-center">
            ${AppDB.currentUser.profiles.map(p => `
              <button onclick="selectProfile(${p.id})" class="group text-center">
                <div class="w-28 h-28 rounded overflow-hidden border-2 border-transparent group-hover:border-white transition-all mb-2 shadow-lg">
                  <img src="${p.avatar}" class="w-full h-full object-cover">
                </div>
                <span class="text-gray-400 group-hover:text-white text-sm">${p.name}</span>
              </button>
            `).join('')}
          </div>
        </div>`;
    }
    function selectProfile(id) { AppDB.currentProfile = AppDB.currentUser.profiles.find(p => p.id === id); saveDB(); render('main'); }

    // =========================================================================
    // MAIN APP
    // =========================================================================
    function renderMainApp() {
      if(!AppDB.currentProfile) return render('profiles');
      return `
        <header id="main-header" class="fixed top-0 left-0 right-0 z-40 transition-all duration-500">
          <div class="bg-gradient-to-b from-[#0a0a0f] via-[#0a0a0f]/90 to-transparent pb-20 pt-2">
            <div class="container mx-auto px-4 md:px-10 flex items-center justify-between">
              <div class="flex items-center gap-8">
                <h1 class="font-display text-3xl text-white cursor-pointer" onclick="render('main')">LDX Play</h1>
                <nav class="hidden md:flex items-center gap-6 text-sm text-gray-300">
                  <a href="#" onclick="render('main')" class="font-semibold text-white">Início</a>
                  <a href="#" onclick="filterContent('series')" class="hover:text-white">Séries</a>
                  <a href="#" onclick="filterContent('movie')" class="hover:text-white">Filmes</a>
                  <a href="#" onclick="filterContent('mylist')" class="hover:text-white">Minha Lista</a>
                  <a href="historico.html" class="hover:text-white">Histórico</a>
                </nav>
              </div>
              <div class="flex items-center gap-5">
                <div class="relative">
                  <button onclick="toggleSearch()" class="p-2 hover:bg-white/10 rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></button>
                  <div id="search-box" class="absolute right-0 top-full mt-2 w-80 bg-[#181818] border border-white/10 rounded shadow-2xl hidden">
                    <input type="text" id="search-input" onkeyup="performSearch(event)" placeholder="Buscar..." class="w-full bg-transparent px-4 py-3 text-sm focus:outline-none">
                    <div id="search-results" class="max-h-80 overflow-y-auto hide-scrollbar"></div>
                  </div>
                </div>
                <div class="relative">
                  <button onclick="toggleMenu()" class="flex items-center gap-2 hover:bg-white/10 p-1 rounded">
                    <img src="${AppDB.currentProfile.avatar}" class="w-8 h-8 rounded object-cover">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                  </button>
                  <div id="profile-menu" class="absolute right-0 top-full mt-2 w-56 bg-[#181818] border border-white/10 rounded shadow-2xl hidden">
                    <div class="py-2">
                      <a href="conta.html" class="block px-4 py-2 hover:bg-white/10 text-sm text-gray-300">Conta</a>
                      <a href="#" onclick="logout()" class="block px-4 py-2 hover:bg-white/10 text-sm text-gray-300">Sair</a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </header>
        <main id="main-container">${renderHomeContent()}</main>
        <footer class="border-t border-white/10 mt-20 py-12 text-gray-500 text-sm text-center">
          <p>© 2024 LDX Play Entertainment, Inc.</p>
        </footer>`;
    }

    // =========================================================================
    // CONTENT
    // =========================================================================
    let heroIdx = 0;
    function renderHomeContent() {
      if(AppDB.content.length === 0) return '<div class="pt-40 text-center">Sem conteúdo</div>';
      return `
        <section id="hero-section" class="relative h-[85vh] w-full overflow-hidden">${renderHero()}</section>
        <section class="relative z-10 -mt-40 pb-20 space-y-6"><div id="content-rows">${renderRows()}</div></section>`;
    }

    function renderHero() {
      const featured = AppDB.content.filter(c => c.img && c.bg);
      const item = featured[heroIdx % featured.length];
      return `
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('${item.bg}')">
          <div class="hero-gradient absolute inset-0"></div>
        </div>
        <div class="relative z-10 h-full flex items-center">
          <div class="container mx-auto px-4 md:px-10 max-w-xl pt-20">
            <h1 class="font-display text-5xl md:text-7xl mb-4">${item.title}</h1>
            <p class="text-sm md:text-base text-gray-200 mb-6 line-clamp-3">${item.desc}</p>
            <div class="flex gap-3">
              <button onclick="playItem(${item.id})" class="flex items-center gap-2 bg-white text-black px-8 py-3 rounded font-semibold hover:bg-white/80 shadow-lg">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                Assistir
              </button>
              <button onclick="openDetail(${item.id})" class="flex items-center gap-2 bg-gray-500/70 px-8 py-3 rounded font-semibold hover:bg-gray-500/50 backdrop-blur-sm">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Info
              </button>
            </div>
          </div>
        </div>`;
    }

    function renderRows() {
      let rowsHtml = '';
      // "Continuar Assistindo"
      if(AppDB.history.length > 0) {
        const historyItems = AppDB.history.map(h => {
          const content = AppDB.content.find(c => c.id === h.id);
          return content ? { ...content, progress: h.progress } : null;
        }).filter(Boolean).reverse();
        
        if(historyItems.length > 0) {
          rowsHtml += `
            <div class="content-row container mx-auto px-4 md:px-10 relative group">
              <h3 class="text-lg md:text-xl font-semibold mb-1">Continuar Assistindo</h3>
              <div class="flex overflow-x-auto hide-scrollbar py-4 gap-2">
                ${historyItems.map(item => `
                  <div onclick="playItem(${item.id})" class="poster-card cursor-pointer relative">
                    <img src="${item.img}" alt="${item.title}">
                    <div class="progress-bar"><div class="progress-fill" style="width: ${item.progress}%"></div></div>
                  </div>
                `).join('')}
              </div>
            </div>`;
        }
      }

      // Top 10
      const top10 = AppDB.content.filter(c => c.top10);
      if(top10.length > 0) {
          rowsHtml += `
            <div class="content-row container mx-auto px-4 md:px-10 relative">
              <h3 class="text-lg md:text-xl font-semibold mb-1">Top 10 no Brasil</h3>
              <div class="flex items-end overflow-x-auto hide-scrollbar py-4 pl-2">
                ${top10.slice(0, 10).map((item, i) => `
                  <div class="flex items-end flex-shrink-0 mr-6 group cursor-pointer" onclick="openDetail(${item.id})">
                    <span class="top10-number">${i+1}</span>
                    <div class="poster-card"><img src="${item.img}"></div>
                  </div>
                `).join('')}
              </div>
            </div>`;
      }

      // Catálogo completo
      rowsHtml += `
        <div class="content-row container mx-auto px-4 md:px-10 relative group">
          <h3 class="text-lg md:text-xl font-semibold mb-1">Catálogo Completo (${AppDB.content.length} títulos)</h3>
          <div class="flex overflow-x-auto hide-scrollbar py-4 gap-2">
            ${AppDB.content.map(item => `
              <div onclick="openDetail(${item.id})" class="poster-card cursor-pointer">
                <img src="${item.img}">
              </div>
            `).join('')}
          </div>
        </div>`;

      return rowsHtml;
    }

    function initMainEvents() {
      clearInterval(heroInterval);
      heroInterval = setInterval(() => { heroIdx++; if(document.getElementById('hero-section')) document.getElementById('hero-section').innerHTML = renderHero(); }, 7000);
      window.addEventListener('scroll', handleScroll);
    }
    function handleScroll() {
      const h = document.getElementById('main-header');
      if(!h) return;
      if(window.scrollY > 50) { h.classList.add('bg-[#0a0a0f]/95', 'backdrop-blur-md'); h.classList.remove('bg-gradient-to-b'); }
      else { h.classList.remove('bg-[#0a0a0f]/95'); h.classList.add('bg-gradient-to-b'); }
    }

    // =========================================================================
    // ACTIONS
    // =========================================================================
    function playItem(id) {
      const item = AppDB.content.find(c => c.id === id);
      if(!item) return;
      
      // Save History
      const historyIndex = AppDB.history.findIndex(h => h.id === id);
      if(historyIndex !== -1) AppDB.history.splice(historyIndex, 1);
      AppDB.history.push({ id: id, progress: Math.floor(Math.random() * 60) + 20, timestamp: Date.now() });
      saveDB();
      
      // Redirect
      window.location.href = `watch.html?id=${id}`;
    }

    function openDetail(id) {
      const item = AppDB.content.find(c => c.id === id);
      if(!item) return;
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
      
      modal.innerHTML = `
        <div class="modal-content overflow-hidden relative">
          <button onclick="this.parentElement.parentElement.remove()" class="absolute top-4 right-4 bg-[#181818] rounded-full p-1 hover:bg-gray-700 z-10">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
          <div class="relative h-96 bg-cover bg-center" style="background-image: url('${item.bg}')">
            <div class="absolute inset-0 bg-gradient-to-t from-[#181818] via-transparent to-transparent"></div>
            <div class="absolute bottom-8 left-8 right-8">
              <h2 class="font-display text-5xl md:text-6xl mb-4 leading-none">${item.title}</h2>
              <button onclick="playItem(${item.id})" class="flex items-center gap-2 bg-white text-black px-8 py-2 rounded font-semibold hover:bg-white/80 shadow-lg">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                Assistir
              </button>
            </div>
          </div>
          <div class="p-8 bg-gradient-to-b from-[#181818] to-[#0f0f14]">
            <div class="flex gap-4 text-sm mb-4">
              <span class="text-green-400 font-bold">${item.rating} Relevância</span>
              <span class="text-gray-400">${item.year}</span>
              <span class="text-gray-400">${item.duration}</span>
            </div>
            <p class="text-gray-300 leading-relaxed">${item.desc}</p>
          </div>
        </div>`;
      document.body.appendChild(modal);
    }

    function filterContent(type) {
      render('main'); 
      setTimeout(() => {
        const mc = document.getElementById('main-container');
        let items = [];
        let title = "";
        if(type === 'movie') { items = AppDB.content.filter(c => c.type === 'movie'); title = "Filmes"; }
        else if(type === 'series') { items = AppDB.content.filter(c => c.type === 'series'); title = "Séries"; }
        else if(type === 'mylist') { items = AppDB.content.filter(c => AppDB.myList.includes(c.id)); title = "Minha Lista"; }

        mc.innerHTML = `
          <div class="pt-32 pb-20 bg-[#0a0a0f]">
            <div class="container mx-auto px-4 md:px-10">
              <h2 class="font-display text-4xl md:text-5xl mb-8">${title}</h2>
              <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-2">
                ${items.map(item => `<div onclick="openDetail(${item.id})" class="cursor-pointer group relative"><img src="${item.img}" class="w-full aspect-[2/3] object-cover rounded"></div>`).join('')}
              </div>
            </div>
          </div>`;
      }, 50);
    }

    function toggleSearch() { document.getElementById('search-box').classList.toggle('hidden'); }
    function performSearch(e) {
      const q = e.target.value.toLowerCase();
      const resBox = document.getElementById('search-results');
      if(q.length < 2) { resBox.innerHTML = ''; return; }
      const found = AppDB.content.filter(c => c.title.toLowerCase().includes(q));
      resBox.innerHTML = found.map(item => `
        <div onclick="openDetail(${item.id}); toggleSearch();" class="flex items-center gap-3 p-2 hover:bg-white/10 cursor-pointer">
          <img src="${item.img}" class="w-10 h-14 object-cover rounded">
          <div><p class="text-sm font-medium">${item.title}</p><p class="text-xs text-gray-400">${item.year}</p></div>
        </div>
      `).join('') || '<p class="p-4 text-sm text-gray-400">Nenhum resultado</p>';
    }
    function toggleMenu() { document.getElementById('profile-menu').classList.toggle('hidden'); }

    // =========================================================================
    // INIT
    // =========================================================================
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('intro-screen').classList.add('fade-out');
        setTimeout(() => {
          document.getElementById('intro-screen').style.display = 'none';
          if(AppDB.currentUser && AppDB.currentProfile) render('main');
          else if (AppDB.currentUser) render('profiles');
          else render('auth');
        }, 1000);
      }, 2200);
    });
  </script>
</body>
</html>
